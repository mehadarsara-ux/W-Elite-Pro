<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W-Elite Pro</title>
    <style>
        #main-header, header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background-color: #001f3f !important; /* Kept your classic navy blue */
            border-bottom: 2px solid #ffcc00; /* Thin premium gold ribbon line */
            transition: all 0.4s ease;
        }
        
        /* Better premium typography for your brand name */
        .brand-logo-text {
            font-family: "Playfair Display", "Didot", "Georgia", serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #ffffff;
            text-transform: uppercase;
        }

        /* Old Simple Apply Now Button Restored */
        .simple-apply-btn {
            background-color: #ffcc00;
            color: #001f3f;
            padding: 8px 16px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: background-color 0.3s ease;
        }
        .simple-apply-btn:hover {
            background-color: #e6b800;
        }
    </style>

    <style>
        /* ==========================================
           1. CORE VARIABLES & RESET
           ========================================== */
        :root {
            --brand-navy: #001f3f;      
            --brand-gold: #D4AF37;      
            --bg-pure-white: #ffffff;   
            --bg-ultra-light: #f8fafc;
            --text-dark: #001f3f;       
            --text-muted: #5a6578;      
            --border-line: rgba(0, 31, 63, 0.08);
            --bezier-smooth: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-pure-white);
            color: var(--text-dark);
            font-family: 'Inter', sans-serif;
            line-height: 1.7;
            overflow-x: hidden;
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
        }

        /* ==========================================
           2. FLOATING TRANSPARENT MENU BAR
           ========================================== */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background-color: transparent;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: var(--bezier-smooth);
        }

        header.scrolled {
            background-color: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 31, 63, 0.08);
            box-shadow: 0 4px 30px rgba(0, 31, 63, 0.03);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 22px 60px;
            transition: var(--bezier-smooth);
        }

        header.scrolled .nav-container {
            padding: 16px 60px;
        }

        .logo {
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: #ffffff;
            text-decoration: none;
            transition: var(--bezier-smooth);
        }

        header.scrolled .logo {
            color: var(--brand-navy);
        }

        .nav-center-menu {
            display: flex;
            gap: 35px;
        }

        .nav-center-menu a {
            color: rgba(255, 255, 255, 0.75);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: var(--bezier-smooth);
            position: relative;
            padding: 4px 0;
        }

        header.scrolled .nav-center-menu a {
            color: rgba(0, 31, 63, 0.7);
        }

        .nav-center-menu a:hover {
            color: var(--brand-gold) !important;
        }
        
        .nav-center-menu a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1px;
            background-color: var(--brand-gold);
            transition: var(--bezier-smooth);
        }

        .nav-center-menu a:hover::after {
            width: 100%;
        }

        .nav-right-cluster {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .nav-apply-btn {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            color: var(--brand-navy);
            background-color: var(--brand-gold);
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 0px;
            transition: var(--bezier-smooth);
        }

        header.scrolled .nav-apply-btn {
            color: #ffffff;
            background-color: var(--brand-navy);
            box-shadow: 0 4px 15px rgba(0, 31, 63, 0.1);
        }

        .nav-apply-btn:hover {
            background-color: #ffffff !important;
            color: var(--brand-navy) !important;
            transform: translateY(-2px);
        }

        header.scrolled .nav-apply-btn:hover {
            background-color: var(--brand-gold) !important;
            color: var(--brand-navy) !important;
        }

        .lang-switcher {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            letter-spacing: 1px;
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            padding-left: 20px;
            transition: var(--bezier-smooth);
        }

        header.scrolled .lang-switcher {
            border-left-color: rgba(0, 31, 63, 0.15);
        }

        .lang-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-weight: 600;
            transition: var(--bezier-smooth);
        }

        header.scrolled .lang-btn {
            color: rgba(0, 31, 63, 0.4);
        }

        .lang-btn.active {
            color: var(--brand-gold);
        }

        header.scrolled .lang-btn.active {
            color: var(--brand-navy);
            font-weight: 700;
        }

        /* ==========================================
           3. HERO AREA
           ========================================== */
        #first-page {
            background-color: var(--brand-navy);
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 140px 8% 80px 8%;
            color: #ffffff;
        }

        .hero-left-layout {
            max-width: 1000px;
            text-align: left; 
        }

        .typewriter-container {
            font-family: 'Playfair Display', serif;
            font-size: 3.6rem;
            line-height: 1.25;
            margin-bottom: 40px;
            min-height: 90px;
            color: #ffffff;
        }

        .typewriter-target {
            color: var(--brand-gold); 
            border-right: 2px solid var(--brand-gold);
            padding-right: 8px;
            font-style: italic;
        }

        .editorial-description {
            display: flex;
            flex-direction: column;
            gap: 24px;
            max-width: 850px;
        }

        .prose-main {
            font-size: 1.35rem;
            font-weight: 300;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.95);
        }

        .prose-sub {
            font-size: 1.1rem;
            font-weight: 300;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.65);
        }

        /* ==========================================
           4. EDITORIAL LEFT GRID LAYOUT ARCHITECTURE
           ========================================== */
        .editorial-left-grid {
            display: grid;
            grid-template-columns: 0.7fr 1.3fr;
            gap: 80px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .section-meta-side {
            text-align: left;
        }

        .section-content-side {
            text-align: left;
        }

        .section-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--brand-gold);
            font-weight: 600;
            display: block;
            margin-bottom: 15px;
        }

        .section-main-title {
            font-size: 3rem;
            color: var(--brand-navy);
            line-height: 1.2;
            font-weight: 400;
        }

        /* ==========================================
           5. ABOUT SECTION
           ========================================== */
        #about-section {
            background-color: var(--bg-pure-white);
            padding: 160px 8% 80px 8%;
            border-bottom: 1px solid var(--border-line);
        }

        .about-text-wrapper p {
            font-size: 1.15rem;
            color: var(--text-dark);
            line-height: 1.8;
            margin-bottom: 25px;
            font-weight: 300;
        }

        .about-text-wrapper p strong {
            font-weight: 600;
            color: var(--brand-navy);
        }

        /* ==========================================
           6. W-ELITE OFFERINGS SECTION (FIXED HEIGHT RESOLVED)
           ========================================== */
        #offerings-section {
            background-color: var(--bg-ultra-light);
            padding: 160px 8%;
            border-bottom: 1px solid var(--border-line);
        }

        .offerings-wrapper {
            max-width: 1300px;
            margin: 0 auto;
        }

        .offerings-top-bar {
            text-align: left;
            margin-bottom: 80px;
        }

        .premium-structural-grid {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            gap: 35px;
        }

        .pathway-card {
            background-color: var(--bg-pure-white);
            padding: 50px 40px;
            border-radius: 4px;
            box-shadow: 0 10px 40px rgba(0, 31, 63, 0.03);
            border: 1px solid rgba(0, 31, 63, 0.04);
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            transition: var(--bezier-smooth);
            position: relative;
            overflow: visible; /* Fixed layout clipping */
            height: auto;      /* Allows natural card growth */
        }

        .pathway-card.featured-card {
            background-color: var(--brand-navy);
            color: #ffffff;
            box-shadow: 0 20px 50px rgba(0, 31, 63, 0.15);
        }

        .pathway-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px rgba(0, 31, 63, 0.08);
        }

        .pathway-card.featured-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 60px rgba(0, 31, 63, 0.25);
        }

        .card-top-content {
            width: 100%;
        }
